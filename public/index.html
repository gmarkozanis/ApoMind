<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ApoMind Ψηφιακός Βοηθός</title>
  <style>
    :root {
      --bg: #08111e;
      --panel: rgba(10, 18, 34, 0.55);
      --line: rgba(255,255,255,0.12);
      --text: #eef4ff;
      --muted: #adc0db;
      --primary: #4c9fff;
      --primary-2: #7c5cff;
      --shadow: 0 25px 80px rgba(0,0,0,0.42);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(5,10,20,0.92), rgba(8,18,34,0.74));
      z-index: -3;
      transform: scale(1.03);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 25%, rgba(76,159,255,0.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(124,92,255,0.16), transparent 26%),
        radial-gradient(circle at 50% 85%, rgba(255,255,255,0.06), transparent 24%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .shell {
      width: min(1150px, 100%);
      padding: 34px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .title {
      text-align: center;
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: -1.5px;
      font-weight: 800;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.98rem;
    }

    .title span {
      background: linear-gradient(135deg, #ffffff, #b9d8ff 45%, #9eabff 75%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero {
      display: grid;
      grid-template-columns: 420px 1fr;
      align-items: center;
      gap: 26px;
    }

    .mascot-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 520px;
    }

    .mascot-wrap::before {
      content: "";
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(76,159,255,0.16), transparent 65%);
      filter: blur(12px);
    }

    .mascot {
      width: min(390px, 100%);
      position: relative;
      z-index: 2;
      object-fit: contain;
      filter: drop-shadow(0 24px 40px rgba(0,0,0,0.42));
    }

    .chat-card {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .chat-head {
      padding: 20px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-weight: 700;
      color: #dbe8ff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-head::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #32d583;
      box-shadow: 0 0 0 7px rgba(50,213,131,0.12);
    }

    .messages {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      max-width: 82%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-size: 0.98rem;
    }

    .bot {
      align-self: flex-start;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: #eff5ff;
      border-bottom-left-radius: 8px;
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      border-bottom-right-radius: 8px;
    }

    .typing {
      display: none;
      padding: 0 22px 14px;
      color: var(--muted);
      font-size: 0.95rem;
      align-items: center;
      gap: 8px;
    }

    .typing.visible { display: flex; }
    .dots { display: inline-flex; gap: 5px; }
    .dots span {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #dce8ff;
      opacity: 0.4;
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.35; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    .composer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(7,13,24,0.3);
    }

    .composer-inner {
      display: grid;
      grid-template-columns: 1fr 62px;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    input {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 0;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 0 12px;
    }

    input::placeholder { color: #99adca; }

    .send {
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 28px rgba(76,159,255,0.28);
      font-size: 1.2rem;
      font-weight: 700;
    }

    .send:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .mascot-wrap { min-height: auto; }
      .mascot { width: min(320px, 75vw); }
      .chat-card { min-height: 460px; }
    }

    @media (max-width: 640px) {
      .shell { padding: 20px; border-radius: 24px; }
      .title { margin-bottom: 12px; }
      .messages { padding: 16px; }
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="shell">
      <h1 class="title"><span>ApoMind</span> Ψηφιακός Βοηθός</h1>
      <p class="subtitle">Έτοιμο για Vercel deployment και γνώση από το δικό σου έγγραφο.</p>

      <section class="hero">
        <div class="mascot-wrap">
          <img src="/mascot.jpg" alt="ApoMind mascot" class="mascot" />
        </div>

        <div class="chat-card">
          <div class="chat-head">Online Assistant</div>

          <div class="messages" id="messages">
            <div class="message bot">Γεια σου! Είμαι ο ApoMind Ψηφιακός Βοηθός. Γράψε το μήνυμά σου και θα σου απαντήσω αμέσως.</div>
          </div>

          <div class="typing" id="typing">
            <div class="dots"><span></span><span></span><span></span></div>
            Ο βοηθός γράφει...
          </div>

          <div class="composer">
            <div class="composer-inner">
              <input id="prompt" type="text" placeholder="Γράψε εδώ το μήνυμά σου..." />
              <button class="send" id="sendBtn">➜</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typing');

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text) return;

      addMessage('user', text);
      promptEl.value = '';
      sendBtn.disabled = true;
      typingEl.classList.add('visible');

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.details || data?.error || 'API error');
        }

        addMessage('bot', data.reply || 'Δεν υπάρχει απάντηση από το API.');
      } catch (error) {
        addMessage('bot', `Σφάλμα: ${error.message}`);
      } finally {
        typingEl.classList.remove('visible');
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
